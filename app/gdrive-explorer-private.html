<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DriveVault</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #f8f9fa;
  --card:    #ffffff;
  --border:  #e9ecef;
  --ink:     #212529;
  --ink2:    #495057;
  --ink3:    #adb5bd;
  --accent:  #2c6e49;
  --acc-l:   #e7f3ed;
  --red:     #dc3545;
  --red-l:   #f8d7da;
  --shadow:  0 2px 4px rgba(0,0,0,.04);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.1);
}
body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }

/* ── HEADER ── */
header {
  background: var(--card); border-bottom: 1px solid var(--border);
  height: 64px; display: flex; align-items: center;
  padding: 0 1.5rem; gap: 1rem;
  position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow);
}
.logo { display: flex; align-items: center; gap: .6rem; font-weight: 800; font-size: 1.1rem; letter-spacing: -.03em; color: var(--accent); }
.logo-mark { width: 32px; height: 32px; border-radius: 8px; background: var(--accent); display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; }
.badge { background: #fffbeb; color: #92400e; font-family: 'JetBrains Mono', monospace; font-size: .65rem; padding: .2rem .6rem; border-radius: 6px; border: 1px solid #fde68a; font-weight: 600; }
.hspace { flex: 1; }

/* Search */
.header-search { position: relative; width: 320px; }
.header-search i { position: absolute; left: .9rem; top: 50%; transform: translateY(-50%); color: var(--ink3); font-size: 0.85rem; }
.header-search input {
  width: 100%; background: #f1f3f5; border: 1px solid transparent;
  border-radius: 10px; padding: .6rem .9rem .6rem 2.4rem;
  font-family: inherit; font-size: .85rem;
  transition: all .2s;
}
.header-search input:focus { border-color: var(--accent); background: var(--card); box-shadow: 0 0 0 4px var(--acc-l); outline: none; }

.user-pill { display: none; align-items: center; gap: .6rem; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: .35rem .35rem .35rem .75rem; font-size: .8rem; font-weight: 600; box-shadow: var(--shadow); }
.user-pill img { width: 26px; height: 26px; border-radius: 8px; }
.user-pill button { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: .3rem .7rem; font-size: .7rem; font-weight: 700; cursor: pointer; color: var(--red); transition: all .2s; }
.user-pill button:hover { background: var(--red); color: white; border-color: var(--red); }

/* ── BREADCRUMB ── */
.breadcrumb-bar {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: .75rem 1.5rem; display: none; align-items: center; gap: .4rem;
}
.bc-item {
  display: flex; align-items: center; gap: .4rem; font-size: .85rem; font-weight: 600; color: var(--ink2);
  cursor: pointer; border-radius: 6px; padding: .3rem .5rem; transition: .2s;
}
.bc-item:hover { background: var(--acc-l); color: var(--accent); }
.bc-item.active { color: var(--ink); cursor: default; }
.bc-sep { color: var(--ink3); font-size: .8rem; }

/* ── TOOLBAR ── */
.toolbar-bar {
  display: none; align-items: center; gap: .75rem;
  padding: .75rem 1.5rem; background: var(--bg); border-bottom: 1px solid var(--border);
}
.sort-sel { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: .4rem .7rem; font-size: .75rem; font-weight: 600; color: var(--ink2); cursor: pointer; }
.view-toggle { display: flex; background: #e9ecef; padding: 3px; border-radius: 8px; }
.vtb { width: 32px; height: 32px; border-radius: 6px; border: none; background: transparent; color: var(--ink2); cursor: pointer; font-size: .9rem; transition: .2s; }
.vtb.on { background: var(--card); color: var(--accent); box-shadow: var(--shadow); }

/* ── GRID VIEW ── */
.file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap: 1rem; }
.grid-item {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 1.25rem 1rem;
  display: flex; flex-direction: column; align-items: center; gap: .6rem;
  cursor: pointer; transition: all .2s cubic-bezier(0.4, 0, 0.2, 1); text-align: center;
}
.grid-item:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: var(--shadow-lg); }
.grid-item .thumb { width: 64px; height: 64px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
.grid-item .thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
.grid-item .gname { font-size: .8rem; font-weight: 700; color: var(--ink); overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; min-height: 2.4em; }

/* ── MODAL & OTHERS ── */
.overlay { position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,.6); backdrop-filter: blur(4px); display: none; }
.overlay.on { display: flex; flex-direction: column; }
.pv-head { background: white; padding: 1rem 1.5rem; display: flex; align-items: center; gap: 1rem; border-bottom: 1px solid var(--border); }
.x-btn { width: 36px; height: 36px; border-radius: 10px; border: none; background: #f1f3f5; cursor: pointer; transition: .2s; }
.x-btn:hover { background: var(--red-l); color: var(--red); }
</style>

</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo"><div class="logo-mark">🔒</div>Drive KPU</div>
  <span class="badge">PRIVATE</span>
  <div class="header-search" id="headerSearch" style="display:none">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="search" id="searchInput" placeholder="Cari semua file... (Ctrl+K)" oninput="handleSearch(this.value)">
    <div class="search-spinner" id="searchSpinner"></div>
  </div>
  <div class="hspace"></div>
  <div class="user-pill" id="userPill">
    <img id="userAvatar" src="" alt="">
    <span id="userName"></span>
    <button onclick="signOut()">Keluar</button>
  </div>
</header>

<!-- BREADCRUMB -->
<div class="breadcrumb-bar" id="breadcrumbBar"></div>

<!-- TOOLBAR -->
<div class="toolbar-bar" id="toolbarBar">
  <select class="sort-sel" id="sortSel" onchange="activeSort=this.value; refreshView()">
    <option value="type">Folder dulu</option>
    <option value="name">Nama A–Z</option>
    <option value="date">Terbaru</option>
    <option value="size">Ukuran</option>
  </select>
  <span class="stat-lbl" id="statLbl"></span>
  <div class="view-toggle">
    <button class="vtb on" id="vGrid" onclick="setView('grid')" title="Grid">▦</button>
    <button class="vtb" id="vList" onclick="setView('list')" title="List">☰</button>
  </div>
</div>

<!-- PREVIEW -->
<div class="overlay" id="pvModal">
  <div class="pv-head">
    <span id="pvIcon" style="font-size:1.2rem"></span>
    <h3 id="pvTitle"></h3>
    <button class="btn-acc" onclick="dlCurrent()">⬇ Unduh</button>
    <button class="x-btn" onclick="closePv()">✕</button>
  </div>
  <div class="pv-body" id="pvBody"></div>
</div>

<main id="mainArea"></main>
<div class="toast" id="toast"></div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
// ╔══════════════════════════════════════════════════════╗
// ║  ⚙️  KONFIGURASI — EDIT SEBELUM UPLOAD KE HOSTING   ║
// ╚══════════════════════════════════════════════════════╝
const CFG = {
  clientId : '754185320971-e5vkssncnojm7es2nrnah6e4l59igihq.apps.googleusercontent.com',     // xxxx.apps.googleusercontent.com
  apiKey   : 'AIzaSyAL285bxJ9x_JBtCQCaJodUfYosLz0uInA',              				         // AIzaSy...
  folderId : '1WiDe-NDazsMXRXgTnxcctdwMxxvUt0ZL',            		   						 // ID folder Google Drive
  appName  : 'MasterKPU',                 													 // Nama aplikasi (bebas diganti)
};
// ═══════════════════════════════════════════════════════

// ── STATE ──────────────────────────────────────────────
let accessToken  = '';
let tokenExpiry  = 0;
let userInfo     = null;
let activeView   = 'grid';
let activeSort   = 'type';
let pvFileId     = '';
let pvFileName   = '';

let navStack = [];
const folderCache = {};

let searchDebounce = null;
let searchAbort    = null;
let isSearchMode   = false;
let searchResults  = [];
let searchQuery    = '';

// ── INIT ───────────────────────────────────────────────
document.title = CFG.appName;
window.addEventListener('load', () => {
  const saved = localStorage.getItem('dvUser');
  if (saved) {
    userInfo = JSON.parse(saved);
    showUserPill();
    silentRefresh().then(ok => {
      if (ok) openFolder(CFG.folderId, 'Home');
      else renderLogin(true);
    });
  } else {
    renderLogin(false);
  }
});

// ── TOKEN MANAGEMENT ───────────────────────────────────
function getTokenClient(callback) {
  return google.accounts.oauth2.initTokenClient({
    client_id: CFG.clientId,
    scope: 'https://www.googleapis.com/auth/drive.readonly profile email',
    callback,
    prompt: '',
  });
}

function silentRefresh() {
  return new Promise((resolve) => {
    try {
      const client = getTokenClient((resp) => {
        if (resp.error || !resp.access_token) { resolve(false); return; }
        saveToken(resp.access_token, resp.expires_in);
        resolve(true);
      });
      client.requestAccessToken({ hint: userInfo?.email || '' });
    } catch { resolve(false); }
  });
}

function saveToken(token, expiresIn) {
  accessToken = token;
  tokenExpiry = Date.now() + ((expiresIn || 3600) - 60) * 1000;
  scheduleAutoRefresh();
}

async function ensureToken() {
  if (accessToken && Date.now() < tokenExpiry) return true;
  const ok = await silentRefresh();
  if (!ok) { renderLogin(true); return false; }
  return true;
}

function scheduleAutoRefresh() {
  const msLeft = tokenExpiry - Date.now() - 5 * 60 * 1000;
  if (msLeft > 0) {
    setTimeout(async () => {
      await silentRefresh();
    }, msLeft);
  }
}

// ── LOGIN ──────────────────────────────────────────────
function renderLogin(returning = false) {
  document.getElementById('headerSearch').style.display = 'none';
  document.getElementById('breadcrumbBar').style.display = 'none';
  document.getElementById('toolbarBar').style.display = 'none';
  const greeting = returning && userInfo?.name
    ? `<p style="font-size:.8rem;color:var(--accent);font-family:'JetBrains Mono',monospace;margin-bottom:.5rem">👋 Halo kembali, ${esc(userInfo.name.split(' ')[0])}!</p>`
    : '';
  document.getElementById('mainArea').innerHTML = `
    <div class="login-wrap"><div class="login-card">
      <div class="ico">🔐</div>
      <h2>${CFG.appName}</h2>
      ${greeting}
      <p>Akses terbatas hanya untuk pengguna yang<br>telah diberi izin oleh administrator.</p>
      <button class="google-btn" onclick="startLogin()">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#4285F4" d="M45.12 24.5c0-1.56-.14-3.06-.4-4.5H24v8.51h11.84c-.51 2.75-2.06 5.08-4.39 6.64v5.52h7.11c4.16-3.83 6.56-9.47 6.56-16.17z"/>
          <path fill="#34A853" d="M24 46c5.94 0 10.92-1.97 14.56-5.33l-7.11-5.52c-1.97 1.32-4.49 2.1-7.45 2.1-5.73 0-10.58-3.87-12.31-9.07H4.34v5.7C7.96 41.07 15.4 46 24 46z"/>
          <path fill="#FBBC05" d="M11.69 28.18C11.25 26.86 11 25.45 11 24s.25-2.86.69-4.18v-5.7H4.34C2.85 17.09 2 20.45 2 24c0 3.55.85 6.91 2.34 9.88l7.35-5.7z"/>
          <path fill="#EA4335" d="M24 10.75c3.23 0 6.13 1.11 8.41 3.29l6.31-6.31C34.91 4.18 29.93 2 24 2 15.4 2 7.96 6.93 4.34 14.12l7.35 5.7c1.73-5.2 6.58-9.07 12.31-9.07z"/>
        </svg>
        ${returning ? 'Lanjutkan dengan Google' : 'Masuk dengan Google'}
      </button>
      <p class="login-note">Hubungi administrator jika tidak bisa masuk.</p>
    </div></div>`;
}

function startLogin() {
  // prompt: 'select_account' hanya saat login pertama kali (bukan silent)
  const client = google.accounts.oauth2.initTokenClient({
    client_id: CFG.clientId,
    scope: 'https://www.googleapis.com/auth/drive.readonly profile email',
    callback: async (resp) => {
      if (resp.error) { toast('❌ Login gagal: ' + resp.error); return; }
      saveToken(resp.access_token, resp.expires_in);
      await fetchUserInfo();
      showUserPill();
      openFolder(CFG.folderId, 'Home');
    },
  });
  // Jika sudah pernah login, coba tanpa popup dulu
  client.requestAccessToken({ prompt: userInfo ? '' : 'select_account' });
}

async function fetchUserInfo() {
  try {
    const r = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
      headers: { Authorization: 'Bearer ' + accessToken }
    });
    userInfo = await r.json();
    // Simpan ke localStorage agar dikenali saat buka ulang browser
    localStorage.setItem('dvUser', JSON.stringify(userInfo));
  } catch { userInfo = { name: 'Pengguna', picture: '' }; }
}

function showUserPill() {
  const p = document.getElementById('userPill');
  p.style.display = 'flex';
  document.getElementById('userAvatar').src = userInfo?.picture || '';
  document.getElementById('userName').textContent = userInfo?.name || '';
}

function signOut() {
  // Revoke token di Google agar benar-benar logout
  if (accessToken) {
    google.accounts.oauth2.revoke(accessToken, () => {});
  }
  accessToken = ''; tokenExpiry = 0; userInfo = null; navStack = [];
  localStorage.removeItem('dvUser');
  document.getElementById('userPill').style.display = 'none';
  renderLogin(false);
  toast('👋 Berhasil keluar');
}

// ── FOLDER NAVIGATION ─────────────────────────────────
async function openFolder(folderId, name) {
  // Cancel any ongoing search
  cancelSearch();
  clearSearchInput();

  // Update nav stack
  const existing = navStack.findIndex(n => n.id === folderId);
  if (existing >= 0) navStack = navStack.slice(0, existing + 1);
  else navStack.push({ id: folderId, name });

  renderBreadcrumb();
  renderLoading();

  document.getElementById('headerSearch').style.display = '';
  document.getElementById('breadcrumbBar').style.display = 'flex';
  document.getElementById('toolbarBar').style.display = 'flex';

  try {
    const items = await fetchFolderContents(folderId);
    renderFolderView(items);
  } catch (e) {
    renderError(e.message);
    if (e.message.includes('401') || e.message.includes('403')) {
      sessionStorage.removeItem('dvToken');
      setTimeout(renderLogin, 1500);
    }
  }
}

// Fetch single folder (with cache)
async function fetchFolderContents(folderId) {
  if (folderCache[folderId]) return folderCache[folderId];
  if (!await ensureToken()) throw new Error('Sesi berakhir, silakan login ulang');
  const items = [];
  let pageToken = '';
  do {
    const url = `https://www.googleapis.com/drive/v3/files`
      + `?q='${folderId}'+in+parents+and+trashed=false`
      + `&fields=nextPageToken,files(id,name,mimeType,size,modifiedTime,thumbnailLink)`
      + `&pageSize=100&key=${CFG.apiKey}`
      + (pageToken ? '&pageToken=' + pageToken : '');
    const r = await fetch(url, { headers: { Authorization: 'Bearer ' + accessToken } });
    if (!r.ok) { const e = await r.json(); throw new Error(`${r.status}: ${e.error?.message}`); }
    const data = await r.json();
    items.push(...data.files);
    pageToken = data.nextPageToken || '';
  } while (pageToken);
  folderCache[folderId] = items;
  return items;
}

// ── BREADCRUMB ────────────────────────────────────────
function renderBreadcrumb() {
  const bar = document.getElementById('breadcrumbBar');
  bar.innerHTML = '';
  navStack.forEach((node, i) => {
    const isLast = i === navStack.length - 1;
    const item = document.createElement('span');
    item.className = 'bc-item' + (isLast ? ' active' : '');
    item.innerHTML = (i === 0 ? '🏠 ' : '📁 ') + esc(node.name);
    if (!isLast) item.onclick = () => openFolder(node.id, node.name);
    bar.appendChild(item);
    if (!isLast) {
      const sep = document.createElement('span');
      sep.className = 'bc-sep'; sep.textContent = '›';
      bar.appendChild(sep);
    }
  });
}

// ── RENDER NORMAL FOLDER VIEW ─────────────────────────
function renderFolderView(items) {
  isSearchMode = false;
  let display = sortItems([...items]);
  const folders = display.filter(isFolder).length;
  const files   = display.length - folders;
  document.getElementById('statLbl').textContent =
    [folders && `${folders} folder`, files && `${files} file`].filter(Boolean).join(', ') || '0 item';

  const main = document.getElementById('mainArea');
  if (!display.length) {
    main.innerHTML = `<div class="state-box"><div class="ico">📭</div><h3>Folder kosong</h3><p>Belum ada file di sini</p></div>`;
    return;
  }

  const container = buildItemContainer(display, false, '');
  main.innerHTML = '';
  main.appendChild(container);
}

// ── SEARCH ────────────────────────────────────────────
function handleSearch(val) {
  clearTimeout(searchDebounce);
  searchQuery = val.trim();

  if (!searchQuery) {
    cancelSearch();
    const currentFolderId = navStack[navStack.length - 1]?.id;
    renderFolderView(folderCache[currentFolderId] || []);
    return;
  }

  // Debounce 400ms
  searchDebounce = setTimeout(() => startRecursiveSearch(searchQuery), 400);
}

function cancelSearch() {
  if (searchAbort) { searchAbort.cancelled = true; searchAbort = null; }
  clearTimeout(searchDebounce);
  setSearchSpinner(false);
}

function clearSearchInput() {
  const si = document.getElementById('searchInput');
  if (si) si.value = '';
  searchQuery = '';
}

async function startRecursiveSearch(query) {
  cancelSearch();

  // Create cancellation token
  const token = { cancelled: false };
  searchAbort = token;

  isSearchMode = true;
  searchResults = [];
  setSearchSpinner(true);

  // Show live results panel immediately
  renderSearchPanel(query, [], true);

  const rootFolderId = navStack[navStack.length - 1]?.id;

  try {
    await recursiveSearch(rootFolderId, query, token, (results) => {
      if (token.cancelled) return;
      searchResults = results;
      renderSearchPanel(query, results, true);
    });
    if (!token.cancelled) {
      renderSearchPanel(query, searchResults, false);
      setSearchSpinner(false);
    }
  } catch (e) {
    if (!token.cancelled) {
      setSearchSpinner(false);
      toast('❌ Pencarian gagal: ' + e.message);
    }
  }
}

// Recursive search through folder tree
// onPartialResult called progressively with running results
async function recursiveSearch(folderId, query, token, onPartialResult) {
  if (token.cancelled) return;

  const items = await fetchFolderContents(folderId);
  if (token.cancelled) return;

  const q = query.toLowerCase();

  for (const item of items) {
    if (token.cancelled) return;
    if (!isFolder(item) && item.name.toLowerCase().includes(q)) {
      // Find path label for this file
      item._searchPath = buildPathLabel(folderId);
      item._parentId   = folderId;
      searchResults.push(item);
      onPartialResult([...searchResults]);
    }
  }

  // Recurse into subfolders
  const subfolders = items.filter(isFolder);
  for (const sub of subfolders) {
    if (token.cancelled) return;
    await recursiveSearch(sub.id, query, token, onPartialResult);
  }
}

// Build human-readable path for a folder id using navStack + cache
function buildPathLabel(folderId) {
  // If it's the current root folder
  const rootId = navStack[navStack.length - 1]?.id;
  if (folderId === rootId) return navStack[navStack.length - 1]?.name || 'Home';

  // Walk cache to find ancestors
  const path = findPathInCache(rootId, folderId, []);
  if (path) return path.map(n => n.name).join(' › ');
  return '...';
}

function findPathInCache(currentId, targetId, pathSoFar) {
  const items = folderCache[currentId];
  if (!items) return null;
  for (const item of items) {
    if (!isFolder(item)) continue;
    const newPath = [...pathSoFar, { id: item.id, name: item.name }];
    if (item.id === targetId) return newPath;
    const deeper = findPathInCache(item.id, targetId, newPath);
    if (deeper) return deeper;
  }
  return null;
}

// ── RENDER SEARCH PANEL ───────────────────────────────
function renderSearchPanel(query, results, isLoading) {
  const main = document.getElementById('mainArea');
  const q = query.toLowerCase();

  // Stat
  if (!isLoading) {
    document.getElementById('statLbl').textContent = results.length + ' hasil';
  } else {
    document.getElementById('statLbl').textContent = results.length + ' ditemukan...';
  }

  const bannerDiv = document.createElement('div');
  bannerDiv.className = 'search-banner';
  bannerDiv.innerHTML = isLoading
    ? `🔍 Mencari "<b>${esc(query)}</b>"… <span class="search-progress">${results.length} file ditemukan</span><button class="clr-btn" onclick="clearSearch()">✕ Batal</button>`
    : `🔍 Hasil untuk "<b>${esc(query)}</b>" — <b>${results.length}</b> file ditemukan<button class="clr-btn" onclick="clearSearch()">✕ Hapus</button>`;

  main.innerHTML = '';
  main.appendChild(bannerDiv);

  if (!results.length) {
    if (!isLoading) {
      const empty = document.createElement('div');
      empty.className = 'state-box';
      empty.innerHTML = `<div class="ico">🔍</div><h3>Tidak ditemukan</h3><p>Coba kata kunci lain</p>`;
      main.appendChild(empty);
    }
    return;
  }

  const container = buildItemContainer(results, true, q);
  main.appendChild(container);
}

function clearSearch() {
  cancelSearch();
  clearSearchInput();
  const currentFolderId = navStack[navStack.length - 1]?.id;
  renderFolderView(folderCache[currentFolderId] || []);
}

// ── BUILD ITEM CONTAINER (grid or list) ───────────────
function buildItemContainer(items, isSearch, highlightQ) {
  const sorted = isSearch ? items : sortItems([...items]);

  if (activeView === 'grid') {
    const grid = document.createElement('div');
    grid.className = 'file-grid';
    sorted.forEach(f => {
      if (isFolder(f) && !isSearch) grid.appendChild(mkFolderGrid(f));
      else if (!isFolder(f)) grid.appendChild(mkFileGrid(f, isSearch, highlightQ));
    });
    return grid;
  } else {
    const list = document.createElement('div');
    list.className = 'file-list';
    sorted.forEach(f => {
      if (isFolder(f) && !isSearch) list.appendChild(mkFolderRow(f));
      else if (!isFolder(f)) list.appendChild(mkFileRow(f, isSearch, highlightQ));
    });
    return list;
  }
}

// ── GRID ITEMS ────────────────────────────────────────
function mkFolderGrid(f) {
  const el = document.createElement('div');
  el.className = 'grid-item';
  el.title = f.name;
  el.innerHTML = `
    <div class="thumb folder-thumb">📁</div>
    <div class="gname">${esc(f.name)}</div>
    <div class="gmeta">Folder · ${fmtDate(f.modifiedTime)}</div>
    <div class="gactions">
      <button class="ga-btn" onclick="event.stopPropagation();openFolder('${f.id}','${ea(f.name)}')">📂 Buka</button>
    </div>`;
  el.onclick = () => openFolder(f.id, f.name);
  return el;
}

function mkFileGrid(f, isSearch, q) {
  const el = document.createElement('div');
  el.className = 'grid-item';
  el.title = f.name;
  const isImg = f.mimeType.startsWith('image/');
  const displayName = q ? hlText(f.name, q) : esc(f.name);
  const pathRow = isSearch && f._searchPath
    ? `<div class="gpath" title="${esc(f._searchPath)}">📂 ${esc(f._searchPath)}</div>` : '';

  el.innerHTML = `
    <div class="thumb">${isImg && f.thumbnailLink
      ? `<img src="${f.thumbnailLink}" alt="" loading="lazy">`
      : emoji(f.mimeType)}</div>
    <div class="gname">${displayName}</div>
    <div class="gmeta">${fmtSize(f.size)}</div>
    ${pathRow}
    <div class="gactions">
      <button class="ga-btn" onclick="event.stopPropagation();openPv('${f.id}','${ea(f.name)}','${f.mimeType}')">👁</button>
      ${isSearch && f._parentId ? `<button class="ga-btn" onclick="event.stopPropagation();goToParent('${f._parentId}','${ea(f._searchPath || 'Folder')}')">📂</button>` : ''}
      <button class="ga-btn" onclick="event.stopPropagation();dlFile('${f.id}','${ea(f.name)}')">⬇</button>
    </div>`;
  el.ondblclick = () => openPv(f.id, f.name, f.mimeType);
  return el;
}

// ── LIST ITEMS ────────────────────────────────────────
function mkFolderRow(f) {
  const el = document.createElement('div');
  el.className = 'list-item';
  el.innerHTML = `
    <div class="list-icon">📁</div>
    <div class="list-info">
      <div class="list-name">${esc(f.name)}</div>
      <div class="list-meta">Folder · ${fmtDate(f.modifiedTime)}</div>
    </div>
    <span class="folder-tag">folder</span>
    <div class="list-acts">
      <button class="la-btn" onclick="event.stopPropagation();openFolder('${f.id}','${ea(f.name)}')">📂 Buka</button>
    </div>`;
  el.onclick = () => openFolder(f.id, f.name);
  return el;
}

function mkFileRow(f, isSearch, q) {
  const el = document.createElement('div');
  el.className = 'list-item';
  const displayName = q ? hlText(f.name, q) : esc(f.name);
  const pathRow = isSearch && f._searchPath
    ? `<div class="list-path">📂 ${esc(f._searchPath)}</div>` : '';
  const openFolderBtn = isSearch && f._parentId
    ? `<button class="la-btn" onclick="event.stopPropagation();goToParent('${f._parentId}','${ea(f._searchPath || 'Folder')}')">📂 Buka Folder</button>`
    : '';

  el.innerHTML = `
    <div class="list-icon">${emoji(f.mimeType)}</div>
    <div class="list-info">
      <div class="list-name">${displayName}</div>
      <div class="list-meta">${fmtSize(f.size)} · ${fmtDate(f.modifiedTime)}</div>
      ${pathRow}
    </div>
    <div class="list-acts">
      <button class="la-btn" onclick="event.stopPropagation();openPv('${f.id}','${ea(f.name)}','${f.mimeType}')">👁 Preview</button>
      ${openFolderBtn}
      <button class="la-btn" onclick="event.stopPropagation();dlFile('${f.id}','${ea(f.name)}')">⬇ Unduh</button>
    </div>`;
  el.onclick = () => openPv(f.id, f.name, f.mimeType);
  return el;
}

// Open the parent folder of a search result
async function goToParent(parentId, pathLabel) {
  cancelSearch();
  clearSearchInput();

  // Build nav stack to this folder by finding path from root
  const rootId = navStack[0]?.id;
  const rootName = navStack[0]?.name || 'Home';

  // Find ancestors chain from root to parentId
  const chain = findPathInCache(rootId, parentId, []);
  navStack = [{ id: rootId, name: rootName }];
  if (chain) {
    chain.forEach(node => navStack.push({ id: node.id, name: node.name }));
  } else {
    navStack.push({ id: parentId, name: pathLabel });
  }

  renderBreadcrumb();
  renderLoading();

  try {
    const items = await fetchFolderContents(parentId);
    renderFolderView(items);
  } catch (e) {
    renderError(e.message);
  }
}

// ── PREVIEW ───────────────────────────────────────────
function openPv(id, name, mime) {
  pvFileId = id; pvFileName = name;
  document.getElementById('pvIcon').textContent = emoji(mime);
  document.getElementById('pvTitle').textContent = name;
  const body = document.getElementById('pvBody');
  body.innerHTML = '';

  if (mime.startsWith('image/')) {
    const img = document.createElement('img');
    img.className = 'pv-img';
    img.src = `https://drive.google.com/thumbnail?id=${id}&sz=w1200`;
    img.alt = name;
    body.appendChild(img);
  } else if (
    mime === 'application/pdf' || mime.includes('document') ||
    mime.includes('spreadsheet') || mime.includes('presentation') ||
    mime.startsWith('video/') || mime.startsWith('audio/')
  ) {
    const iframe = document.createElement('iframe');
    iframe.className = 'pv-frame';
    iframe.src = `https://drive.google.com/file/d/${id}/preview`;
    iframe.allow = 'autoplay';
    body.appendChild(iframe);
  } else {
    body.innerHTML = `<div class="pv-none"><div class="big">${emoji(mime)}</div>
      <p style="font-family:'JetBrains Mono',monospace;font-size:.82rem;color:var(--ink2)">
        Preview tidak tersedia.<br>Silakan unduh file ini.
      </p></div>`;
  }
  document.getElementById('pvModal').classList.add('on');
}
function closePv() {
  document.getElementById('pvModal').classList.remove('on');
  document.getElementById('pvBody').innerHTML = '';
}
function dlCurrent() { dlFile(pvFileId, pvFileName); }
document.getElementById('pvModal').addEventListener('click', e => {
  if (e.target === document.getElementById('pvModal')) closePv();
});

// ── DOWNLOAD ──────────────────────────────────────────
function dlFile(id, name) {
  toast('⏳ Menyiapkan unduhan...');
  ensureToken().then(ok => {
    if (!ok) return;
    fetch(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`, {
      headers: { Authorization: 'Bearer ' + accessToken }
    })
    .then(r => { if (!r.ok) throw new Error(r.status); return r.blob(); })
    .then(blob => {
      const url = URL.createObjectURL(blob);
      Object.assign(document.createElement('a'), { href: url, download: name }).click();
      URL.revokeObjectURL(url);
      toast('⬇ Mengunduh ' + name);
    })
    .catch(() => toast('❌ Gagal mengunduh, coba lagi'));
  });
}

// ── VIEW / SORT ───────────────────────────────────────
function setView(v) {
  activeView = v;
  document.getElementById('vGrid').classList.toggle('on', v === 'grid');
  document.getElementById('vList').classList.toggle('on', v === 'list');
  refreshView();
}

function refreshView() {
  if (isSearchMode) {
    renderSearchPanel(searchQuery, searchResults, false);
  } else {
    const currentFolderId = navStack[navStack.length - 1]?.id;
    renderFolderView(folderCache[currentFolderId] || []);
  }
}

function sortItems(items) {
  return items.sort((a, b) => {
    if (activeSort === 'type') {
      const af = isFolder(a) ? 0 : 1, bf = isFolder(b) ? 0 : 1;
      if (af !== bf) return af - bf;
      return a.name.localeCompare(b.name);
    }
    if (activeSort === 'name') return a.name.localeCompare(b.name);
    if (activeSort === 'date') return new Date(b.modifiedTime) - new Date(a.modifiedTime);
    if (activeSort === 'size') return (parseInt(b.size)||0) - (parseInt(a.size)||0);
    return 0;
  });
}

// ── STATE RENDERS ─────────────────────────────────────
function renderLoading() {
  document.getElementById('mainArea').innerHTML =
    `<div class="state-box"><div class="spinner"></div>
     <p style="font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--ink2)">Memuat isi folder...</p></div>`;
}
function renderError(msg) {
  document.getElementById('mainArea').innerHTML =
    `<div class="state-box"><div class="ico">⚠️</div><h3>Gagal Memuat</h3><p>${esc(msg)}</p></div>`;
}

// ── HELPERS ───────────────────────────────────────────
function isFolder(f) { return f.mimeType === 'application/vnd.google-apps.folder'; }

function setSearchSpinner(on) {
  document.getElementById('searchSpinner').style.display = on ? 'block' : 'none';
}

function hlText(text, q) {
  // Highlight matching part
  const escaped = esc(text);
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  if (idx < 0) return escaped;
  return esc(text.slice(0, idx))
    + `<span class="hl">${esc(text.slice(idx, idx + q.length))}</span>`
    + esc(text.slice(idx + q.length));
}

function emoji(mime) {
  if (mime.startsWith('image/')) return '🖼';
  if (mime.startsWith('video/')) return '🎬';
  if (mime.startsWith('audio/')) return '🎵';
  if (mime === 'application/pdf') return '📄';
  if (mime.includes('document') || mime.includes('word')) return '📝';
  if (mime.includes('spreadsheet') || mime.includes('excel')) return '📊';
  if (mime.includes('presentation') || mime.includes('powerpoint')) return '🖥';
  if (mime.includes('zip') || mime.includes('rar')) return '📦';
  if (mime.startsWith('text/')) return '📃';
  return '📎';
}

function fmtSize(b) {
  if (!b) return '—'; b = parseInt(b);
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  if (b < 1073741824) return (b/1048576).toFixed(1) + ' MB';
  return (b/1073741824).toFixed(1) + ' GB';
}
function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('id-ID', { day:'numeric', month:'short', year:'numeric' });
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function ea(s)  { return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

let _tid;
function toast(msg, ms=3000) {
  clearTimeout(_tid); const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  _tid = setTimeout(() => t.classList.remove('on'), ms);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('pvModal').classList.contains('on')) { closePv(); return; }
    if (isSearchMode) { clearSearch(); return; }
    if (navStack.length > 1) {
      const prev = navStack[navStack.length - 2];
      openFolder(prev.id, prev.name);
    }
  }
  if ((e.ctrlKey||e.metaKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchInput')?.focus();
  }
});
</script>
